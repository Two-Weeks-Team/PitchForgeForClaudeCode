<!--
  Shape: hierarchy-diagram
  Used for: F6 (architecture) — multi-tier system org charts
  Default duration: 20s
  Default animation timeline:
    sequential SVG node light-up, 0.3s apart, top → bottom

  Slot variables:
    {{label}}        — small all-caps tracker above the diagram
    {{tiers}}        — array of {name, count, role, color_token}
                        tier 0 = root (single circle)
                        tier 1 = sub-roots (1-3 circles)
                        tier 2 = grouped boxes (3-5 boxes)
                        tier 3 = blackboard / shared substrate (1 dashed box)
    {{footer_note}}  — Layer-0 hooks line at the bottom

  v0.1.0 ships a hardcoded variant in scripts/generate-deck.py rendering the
  reference deck's 6-tier engineering company. v0.5+ generalizes to any
  hierarchy via {{tiers}} + render-svg.py.
-->

<div class="canvas-frame c-f6">
  <div class="lbl">{{label}}</div>
  <svg viewBox="0 0 540 280">
    <g font-family="ui-sans-serif" font-size="9.5" fill="oklch(0.85 0.02 250)">
      <!-- root tier -->
      <circle cx="270" cy="40" r="13" fill="{{tiers.0.color}}" stroke="{{tiers.0.stroke}}" stroke-width="1.5"/>
      <text x="270" y="44" text-anchor="middle" fill="#1b1107" font-weight="700" font-size="9">{{tiers.0.short}}</text>
      <text x="270" y="20" text-anchor="middle" fill="{{tiers.0.color}}" font-size="9" font-weight="700">{{tiers.0.label}} ({{tiers.0.count}})</text>

      <!-- intermediate + leaf tiers — assembler fills via {{tiers_svg}} -->
      {{tiers_svg}}

      <!-- shared substrate -->
      <rect x="100" y="200" width="340" height="40" rx="6" fill="oklch(0.20 0.04 250)" stroke="oklch(0.74 0.13 220)" stroke-dasharray="4 3"/>
      <text x="270" y="218" text-anchor="middle" fill="oklch(0.74 0.13 220)" font-weight="700" font-size="10">{{substrate_name}}</text>
      <text x="270" y="231" text-anchor="middle" fill="oklch(0.66 0.02 250)" font-size="8.5">{{substrate_subtitle}}</text>
      <text x="270" y="260" text-anchor="middle" fill="oklch(0.66 0.02 250)" font-size="9" font-weight="700">{{footer_note}}</text>
    </g>
  </svg>
</div>
