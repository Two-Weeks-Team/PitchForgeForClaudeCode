name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  verify-plugin:
    name: Verify plugin structure (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema
      - name: Verify plugin structure
        run: bash scripts/verify-plugin.sh

  agent-inventory:
    name: Agent inventory (13 target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Count agents
        run: |
          count=$(find plugins/pitch/agents -name "*.md" -type f | wc -l)
          echo "Found $count agents"
          [[ "$count" -eq 13 ]] || { echo "Expected 13 agents (v0.1.0 target may be lower — adjust this gate as agents land)" ; exit 1; }

  shell-lint:
    name: Shell script lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          # --severity=warning ignores SC2015 (A && B || C info) which is a
          # false positive here: ok/bad helper functions always return 0,
          # so C does not run when B is "true".
          find scripts tests/e2e -name "*.sh" -exec shellcheck --severity=warning {} +

  acceptance:
    name: Acceptance suites (Tier 1 + variety + standalone + recursive + recording-kit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run acceptance suites
        run: |
          bash scripts/verify-plugin.sh
          bash tests/e2e/regenerate-reference-deck.sh
          bash tests/e2e/v0.5-variety.sh
          bash tests/e2e/v0.5-standalone.sh
          bash tests/e2e/v1.0-recursive.sh
          bash tests/e2e/v1.0-recording-kit.sh
